<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Couchbase - Movie Database</title>
  <link rel="stylesheet" href="/public/css/styles.css">
</head>
<body>
  <div class="main-content">
    <header class="top-bar">
      <h1>Couchbase</h1>
      <div class="top-bar-actions">
        <button id="addNewBtn" class="btn btn-primary">+ Add Movie</button>
      </div>
    </header>

    <div class="status-bar" id="statusBar"></div>

    <div class="movies-container">
      <div class="grid" id="moviesGrid"></div>
    </div>
  </div>

  <div class="modal" id="movieModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Movie</h2>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="movieTitle">Title</label>
          <input type="text" id="movieTitle" placeholder="Movie title">
        </div>
        <div class="form-group">
          <label for="releaseYear">Release Year</label>
          <input type="number" id="releaseYear" placeholder="e.g. 2024" min="1900" max="2030">
        </div>
        <div class="form-group">
          <label>Poster Image</label>
          <div class="image-upload-area">
            <div class="image-preview" id="imagePreview">
              <span class="placeholder">No image</span>
              <img id="previewImg" src="" alt="" style="display: none;">
            </div>
            <div class="upload-actions">
              <label class="btn btn-secondary" for="imageInput">Choose Image</label>
              <input type="file" id="imageInput" accept="image/*" style="display: none;">
              <button type="button" id="removeImageBtn" class="btn btn-danger" style="display: none;">Remove</button>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button id="cancelBtn" class="btn btn-secondary">Cancel</button>
          <button id="saveBtn" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="deleteModal">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2>Confirm Delete</h2>
        <button class="close-btn" id="closeDeleteModal">&times;</button>
      </div>
      <div class="modal-body">
        <p>Delete <strong id="deleteMovieTitle"></strong>?</p>
        <p class="warning">This cannot be undone.</p>
        <div class="modal-actions">
          <button id="cancelDeleteBtn" class="btn btn-secondary">Cancel</button>
          <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/public/js/app.js"></script>
</body>
</html>
